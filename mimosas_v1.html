<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mimosas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F9F5F8;--bg2:#F2EBF5;--white:#FFFFFF;
  --ink:#2D1F35;--ink-soft:#6B4E7A;--ink-muted:#A889B8;
  --pink:#E8749A;--pink-bg:#FDF0F5;
  --violet:#8B5BAE;--violet-bg:#F3EEF8;
  --free:#6BBF99;--free-bg:#EDF8F3;
  --gold:#C9934A;--gold-bg:#FDF5EC;
  --warn:#FF6B35;--warn-bg:#FFF0EB;
  --shadow-sm:0 2px 12px rgba(139,91,174,.08);
  --shadow-md:0 4px 24px rgba(139,91,174,.12);
  --shadow-btn:0 4px 16px rgba(232,116,154,.3);
  --shadow-card:0 2px 20px rgba(45,31,53,.06);
}
.dark{
  --bg:#0F0820;--bg2:#1A0F30;--white:#1E1040;
  --ink:#F0E8FF;--ink-soft:#C4A8E8;--ink-muted:#7A5A9A;
  --pink-bg:#2A0A1E;--violet-bg:#1A0A2E;--free-bg:#052A1E;
  --gold-bg:#1A1000;--warn-bg:#200800;
  --shadow-card:0 2px 20px rgba(0,0,0,.3);
  --shadow-sm:0 2px 12px rgba(0,0,0,.2);
}
html{background:var(--bg);}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--bg);}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;color:var(--ink);letter-spacing:8px;line-height:1;text-align:center;}
.login-logo span{color:var(--pink);}
.login-barrio{font-size:.72rem;color:var(--ink-muted);letter-spacing:4px;text-transform:uppercase;text-align:center;margin-top:6px;margin-bottom:44px;}
.login-select-title{font-size:.65rem;font-weight:600;letter-spacing:2.5px;color:var(--ink-muted);text-transform:uppercase;margin-bottom:12px;text-align:center;}
.user-list{width:100%;max-width:320px;display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.user-option{background:var(--white);border-radius:16px;padding:11px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:var(--shadow-card);transition:transform .15s;}
.user-option:active{transform:scale(.97);}
.user-option.admin-opt{background:linear-gradient(135deg,#2D1F35,#4A2A5E);}
.u-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:white;flex-shrink:0;}
.u-name{font-size:.88rem;font-weight:600;color:var(--ink);}
.u-role{font-size:.66rem;color:var(--ink-muted);}
.u-turns{font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:7px;background:var(--violet-bg);color:var(--violet);margin-left:auto;white-space:nowrap;}
.admin-opt .u-name,.admin-opt .u-role{color:white;}
.admin-opt .u-turns{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);}

/* PIN */
.pin-screen{width:100%;max-width:280px;text-align:center;}
.pin-who{font-size:.66rem;font-weight:600;letter-spacing:2px;color:var(--ink-muted);text-transform:uppercase;margin-bottom:4px;}
.pin-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--ink);margin-bottom:24px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:28px;}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg2);transition:background .15s,transform .15s;}
.pin-dot.filled{background:var(--pink);transform:scale(1.1);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.pin-btn{background:var(--white);border-radius:14px;padding:15px;font-size:1.25rem;font-weight:400;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-sm);border:none;font-family:'Inter',sans-serif;transition:transform .1s;}
.pin-btn:active{transform:scale(.93);}
.pin-btn.del{font-size:.88rem;color:var(--ink-muted);}
.pin-btn.empty{background:transparent;box-shadow:none;cursor:default;}
.pin-error{color:var(--pink);font-size:.74rem;margin-top:12px;min-height:18px;}
.pin-back{margin-top:14px;color:var(--ink-muted);font-size:.76rem;cursor:pointer;}

/* APP */
#appScreen{display:none;min-height:100vh;padding-bottom:68px;background:var(--bg);}
.nav{background:var(--white);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 1px 12px rgba(45,31,53,.05);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;letter-spacing:2px;}
.nav-logo span{color:var(--pink);}
.nav-right{display:flex;align-items:center;gap:7px;}
.nav-user{font-size:.68rem;color:var(--ink-muted);}
.nav-clock{font-size:.78rem;font-weight:600;color:var(--ink-soft);}
.logout-btn{font-size:.68rem;color:var(--ink-muted);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.dark-toggle{width:32px;height:18px;border-radius:9px;background:var(--bg2);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0;}
.dark-toggle.on{background:var(--violet);}
.dark-toggle-knob{width:12px;height:12px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:left .2s;}
.dark-toggle.on .dark-toggle-knob{left:17px;}

.bottom-tabs{position:fixed;bottom:0;left:0;right:0;background:var(--white);display:flex;box-shadow:0 -1px 16px rgba(45,31,53,.07);z-index:100;}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;gap:2px;}
.btab-icon{font-size:1.1rem;}
.btab-label{font-size:.58rem;font-weight:600;color:var(--ink-muted);}
.btab.active .btab-label{color:var(--pink);}
.btab-bar{width:16px;height:2px;border-radius:2px;background:transparent;margin-top:2px;}
.btab.active .btab-bar{background:var(--pink);}

.view{display:none;padding:16px 14px 10px;}
.view.active{display:block;}

/* ROOMS */
.room-card{background:var(--white);border-radius:20px;padding:16px 18px;box-shadow:var(--shadow-card);margin-bottom:10px;transition:all .3s;}
.room-card.occ{background:var(--pink-bg);}
.room-card.free-r{background:var(--free-bg);}
.room-card.warning{background:var(--warn-bg);animation:warnPulse 1.5s infinite;}
@keyframes warnPulse{0%,100%{box-shadow:0 4px 20px rgba(255,107,53,.2)}50%{box-shadow:0 4px 32px rgba(255,107,53,.45)}}
.room-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.room-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:400;}
.spill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:14px;}
.spill.free{background:rgba(107,191,153,.15);}
.spill.busy{background:rgba(232,116,154,.15);}
.spill.warn{background:rgba(255,107,53,.15);}
.sdot{width:5px;height:5px;border-radius:50%;animation:breathe 2.5s infinite;}
.sdot.free{background:var(--free);}
.sdot.busy{background:var(--pink);}
.sdot.warn{background:var(--warn);}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.4}}
.slabel{font-size:.66rem;font-weight:700;}
.slabel.free{color:var(--free);}
.slabel.busy{color:var(--pink);}
.slabel.warn{color:var(--warn);}
.room-big-time{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;text-align:center;line-height:1;padding:10px 0 2px;letter-spacing:2px;}
.room-big-time.occ{color:var(--pink);}
.room-big-time.warn-t{color:var(--warn);}
.room-big-time.free-t{color:var(--free);font-size:2rem;padding:12px 0;}
.room-eta{text-align:center;font-size:.74rem;color:var(--gold);font-weight:600;margin-bottom:3px;}
.room-masajista{text-align:center;font-size:.76rem;color:var(--ink-muted);margin-bottom:6px;}
.room-masajista strong{color:var(--ink-soft);}
.room-note{text-align:center;font-size:.7rem;color:var(--ink-muted);font-style:italic;margin-bottom:6px;}
.room-btn{width:100%;padding:11px;border-radius:12px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .15s;}
.room-btn.enter{background:var(--pink);color:white;box-shadow:var(--shadow-btn);}
.room-btn.manage{background:var(--white);color:var(--pink);box-shadow:0 2px 10px rgba(232,116,154,.2);}
.room-btn:active{transform:scale(.97);}

/* FULL SCREENS */
.full-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;}
.full-nav{background:var(--white);height:50px;display:flex;align-items:center;padding:0 16px;box-shadow:0 1px 12px rgba(45,31,53,.05);position:sticky;top:0;}
.back-btn{background:none;border:none;color:var(--pink);font-size:.84rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.full-nav-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;position:absolute;left:50%;transform:translateX(-50%);}
.full-body{padding:20px 18px 44px;}

/* TIME WHEEL - Samsung style */
.wheel-section{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;}
.wheel-section-label{font-size:.62rem;font-weight:700;color:var(--ink-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.wheel-row{display:flex;align-items:center;justify-content:center;gap:0;}
.wheel-sep{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;color:var(--ink);line-height:1;padding:0 6px;/* align sep with selected item */margin-top:0;}
.wheel-outer{height:195px;width:90px;overflow:hidden;position:relative;cursor:grab;touch-action:none;}
.wheel-outer:active{cursor:grabbing;}
.wheel-outer::before,.wheel-outer::after{content:'';position:absolute;left:0;right:0;z-index:2;pointer-events:none;}
.wheel-outer::before{top:0;height:72px;background:linear-gradient(to bottom,var(--bg) 10%,transparent);}
.wheel-outer::after{bottom:0;height:72px;background:linear-gradient(to top,var(--bg) 10%,transparent);}
.wheel-inner{display:flex;flex-direction:column;align-items:center;will-change:transform;}
.wheel-item{height:65px;display:flex;align-items:center;justify-content:center;width:90px;font-family:'Cormorant Garamond',serif;font-weight:300;pointer-events:none;transition:font-size .06s,opacity .06s,color .06s;}

/* DURATION OPTIONS */
.dur-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
.dur-opt{padding:14px 6px;border-radius:14px;background:var(--bg2);text-align:center;cursor:pointer;transition:all .15s;border:2px solid transparent;}
.dur-opt:active{transform:scale(.96);}
.dur-opt.sel{background:var(--pink-bg);border-color:var(--pink);}
.dur-num{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--pink);line-height:1;}
.dur-label{font-size:.64rem;color:var(--ink-muted);margin-top:2px;}

/* CHIPS */
.chips-title{font-size:.64rem;font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;text-align:center;}
.chips-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:18px;}
.m-chip{padding:7px 14px;border-radius:18px;background:var(--bg2);color:var(--ink-soft);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
.m-chip.sel{background:var(--pink-bg);color:var(--pink);}
.nota-inp{width:100%;background:var(--bg2);border:none;border-radius:11px;color:var(--ink);font-family:'Inter',sans-serif;font-size:.82rem;padding:10px 12px;outline:none;margin-bottom:16px;}

/* STEPS */
.step-indicator{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:18px;}
.step-dot-ind{width:7px;height:7px;border-radius:50%;background:var(--bg2);}
.step-dot-ind.active{background:var(--pink);}
.step-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;text-align:center;margin-bottom:3px;}
.step-sub{font-size:.64rem;color:var(--ink-muted);text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px;}

/* COMMON */
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;color:var(--ink);margin-bottom:3px;}
.sec-sub{font-size:.72rem;color:var(--ink-muted);margin-bottom:12px;}
.card{background:var(--white);border-radius:16px;padding:14px;box-shadow:var(--shadow-card);margin-bottom:9px;}
.btn-primary{width:100%;padding:13px;background:var(--pink);color:white;border:none;border-radius:13px;font-size:.86rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:var(--shadow-btn);transition:transform .15s;margin-top:4px;}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{width:100%;padding:11px;background:var(--white);color:var(--ink-soft);border:none;border-radius:12px;font-size:.8rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:var(--shadow-sm);}
.btn-warn{background:var(--warn-bg);color:var(--warn);}
.btn-green{background:var(--free-bg);color:var(--free);}
.hist-item{background:var(--white);border-radius:12px;padding:10px 13px;box-shadow:var(--shadow-sm);margin-bottom:6px;}
.hist-top{display:flex;justify-content:space-between;margin-bottom:2px;}
.hist-name{font-size:.8rem;font-weight:700;}
.hist-time{font-size:.68rem;color:var(--ink-muted);}
.hist-detail{font-size:.71rem;color:var(--ink-muted);}
.aslot{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:11px;margin-bottom:5px;}
.aslot.pend{background:var(--pink-bg);}
.aslot.conf{background:var(--free-bg);}
.aslot-time{font-size:.76rem;font-weight:700;min-width:40px;}
.aslot-time.pend{color:var(--pink);}
.aslot-time.conf{color:var(--free);}
.aslot-client{font-size:.76rem;color:var(--ink-soft);flex:1;}
.conf-btn-s{padding:4px 9px;border-radius:8px;border:none;background:var(--pink);color:white;font-size:.64rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.conf-chip{padding:3px 8px;border-radius:8px;background:var(--free-bg);color:var(--free);font-size:.64rem;font-weight:700;}
.empty-msg{font-size:.76rem;color:var(--ink-muted);text-align:center;padding:12px;font-style:italic;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.week-btn{background:var(--white);border:none;border-radius:9px;padding:5px 11px;font-size:.75rem;color:var(--ink-soft);cursor:pointer;box-shadow:var(--shadow-sm);font-family:'Inter',sans-serif;}
.week-label{font-size:.76rem;font-weight:700;color:var(--ink);}
.week-days{display:flex;gap:5px;margin-bottom:12px;}
.week-day{flex:1;padding:7px 3px;border-radius:10px;text-align:center;background:var(--bg2);}
.week-day.today{background:var(--pink);}
.wday-name{font-size:.54rem;font-weight:600;color:var(--ink-muted);}
.wday-num{font-size:.8rem;font-weight:700;color:var(--ink);}
.week-day.today .wday-name,.week-day.today .wday-num{color:white;}
.block-grid{display:flex;flex-wrap:wrap;gap:6px;}
.bchip{padding:6px 11px;border-radius:16px;font-size:.7rem;font-weight:600;background:var(--bg2);color:var(--ink-soft);cursor:pointer;}
.bchip.is-bl{background:var(--gold-bg);color:var(--gold);}
.bchip.is-tk{opacity:.35;cursor:default;text-decoration:line-through;}
.notes-ta{width:100%;background:var(--bg2);border:none;border-radius:11px;color:var(--ink);font-family:'Inter',sans-serif;font-size:.8rem;padding:10px 12px;resize:none;outline:none;line-height:1.6;}
.m-card{background:var(--white);border-radius:18px;box-shadow:var(--shadow-card);margin-bottom:9px;overflow:hidden;}
.m-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.m-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;color:white;flex-shrink:0;}
.m-info{flex:1;}
.m-name{font-size:.88rem;font-weight:700;}
.m-spec{font-size:.68rem;color:var(--ink-muted);}
.m-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.av-pill{display:flex;align-items:center;gap:3px;}
.av-dot{width:5px;height:5px;border-radius:50%;}
.av-dot.f{background:var(--free);}
.av-dot.b{background:var(--pink);}
.av-txt{font-size:.64rem;font-weight:700;}
.av-txt.f{color:var(--free);}
.av-txt.b{color:var(--pink);}
.pend-b{background:var(--pink-bg);color:var(--pink);border-radius:6px;padding:2px 6px;font-size:.6rem;font-weight:700;}
.m-body{display:none;border-top:1px solid var(--bg2);}
.m-body.open{display:block;}
.m-btabs{display:flex;border-bottom:1px solid var(--bg2);}
.m-btab{flex:1;padding:7px 0;text-align:center;font-size:.66rem;font-weight:600;color:var(--ink-muted);cursor:pointer;border-bottom:2px solid transparent;}
.m-btab.active{color:var(--pink);border-bottom-color:var(--pink);}
.m-bc{padding:12px 14px;}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.form-label{font-size:.64rem;font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:1.2px;}
.form-input{width:100%;padding:10px 12px;background:var(--bg2);border:none;border-radius:11px;font-size:.84rem;font-family:'Inter',sans-serif;color:var(--ink);outline:none;}
.add-btn{width:100%;padding:11px;background:var(--violet-bg);color:var(--violet);border:none;border-radius:11px;font-size:.76rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:var(--shadow-sm);margin-top:5px;}
.conf-card{display:none;background:var(--free-bg);border-radius:18px;padding:22px 18px;text-align:center;box-shadow:var(--shadow-card);}
.conf-card.show{display:block;}
.conf-icon{font-size:2rem;margin-bottom:8px;}
.conf-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--free);margin-bottom:6px;}
.conf-body{font-size:.78rem;color:var(--ink-soft);line-height:1.6;margin-bottom:16px;}
.stats-filter{display:flex;gap:5px;margin-bottom:14px;}
.sf-btn{padding:6px 12px;border-radius:16px;border:none;font-size:.68rem;font-weight:600;font-family:'Inter',sans-serif;background:var(--bg2);color:var(--ink-muted);cursor:pointer;}
.sf-btn.active{background:var(--pink);color:white;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-c{background:var(--white);border-radius:15px;padding:13px;box-shadow:var(--shadow-card);}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--pink);line-height:1;}
.stat-l{font-size:.62rem;color:var(--ink-muted);margin-top:3px;}
.bar-r{margin-bottom:8px;}
.bar-ls{display:flex;justify-content:space-between;font-size:.68rem;color:var(--ink-soft);margin-bottom:3px;}
.bar-tr{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.bar-fi{height:100%;border-radius:3px;transition:width .4s;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;}
.modal-ov.open{display:flex;}
.modal-sh{background:var(--bg);border-radius:22px 22px 0 0;padding:20px 18px 36px;width:100%;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;text-align:center;margin-bottom:16px;}
.time-opts-modal{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.topt{padding:14px;border-radius:14px;background:var(--bg2);text-align:center;cursor:pointer;transition:transform .15s;}
.topt:active{transform:scale(.96);}
.topt-num{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:var(--pink);line-height:1;}
.topt-label{font-size:.68rem;color:var(--ink-muted);}
.notice{border-radius:11px;padding:10px 13px;font-size:.74rem;line-height:1.55;margin-bottom:9px;}
.notice.pink{background:var(--pink-bg);color:var(--ink-soft);}
.notice.pink strong{color:var(--pink);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:var(--bg);padding:8px 18px;border-radius:32px;font-size:.76rem;font-weight:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:400;white-space:nowrap;box-shadow:var(--shadow-md);}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">MIMOSAS<span>.</span></div>
  <div class="login-barrio">Buceo</div>
  <div id="userListWrap">

/* ========= SAMSUNG-STYLE WHEEL ========= */
function buildWheel(outerId, items, initIdx, onChangeCb){
  const outer = document.getElementById(outerId);
  outer.innerHTML = '<div class="wheel-inner"></div>';
  const inner = outer.querySelector('.wheel-inner');
  const n = items.length;
  let centerVal = ((initIdx % n) + n) % n;

  const VISIBLE = 3; // items visible above/below center

  function getItem(offset){
    return items[((centerVal + offset) % n + n) % n];
  }

  function rebuildDOM(){
    inner.innerHTML = '';
    for(let off = -VISIBLE; off <= VISIBLE; off++){
      const el = document.createElement('div');
      el.className = 'wheel-item';
      el.dataset.off = off;
      el.textContent = getItem(off);
      inner.appendChild(el);
    }
  }

  function applyOffsetStyles(extraOffsetPx){
    inner.querySelectorAll('.wheel-item').forEach(el => {
      const baseOff = parseFloat(el.dataset.off);
      const totalOff = baseOff + extraOffsetPx / ITEM_H;
      const dist = Math.abs(totalOff);
      let size, opacity, weight, color;
      if(dist < 0.5){
        size = '3rem'; opacity = 1; weight = 400; color = 'var(--ink)';
      } else if(dist < 1.5){
        const t = dist - 0.5;
        size = `${3 - t*1.2}rem`; opacity = 1 - t*0.55; weight = 300; color = 'var(--ink-muted)';
      } else if(dist < 2.5){
        const t = dist - 1.5;
        size = `${1.8 - t*0.5}rem`; opacity = 0.45 - t*0.2; weight = 300; color = 'var(--ink-muted)';
      } else {
        size = '1.1rem'; opacity = 0.15; weight = 300; color = 'var(--ink-muted)';
      }
      el.style.fontSize = size;
      el.style.opacity = opacity;
      el.style.fontWeight = weight;
      el.style.color = color;
    });
  }

  function renderStatic(animated){
    inner.style.transition = animated ? 'transform .22s cubic-bezier(.25,.46,.45,.94)' : 'none';
    inner.style.transform = 'translateY(0)';
    applyOffsetStyles(0);
  }

  rebuildDOM();
  renderStatic(false);
  onChangeCb(centerVal);

  let startY = 0, dragging = false, currentDragPx = 0;

  function onStart(y){ startY = y; dragging = true; currentDragPx = 0; inner.style.transition = 'none'; }

  function onMove(y){
    if(!dragging) return;
    currentDragPx = y - startY;
    inner.style.transform = `translateY(${currentDragPx}px)`;
    applyOffsetStyles(currentDragPx);
  }

  function onEnd(){
    if(!dragging) return;
    dragging = false;
    const steps = -Math.round(currentDragPx / ITEM_H);
    if(steps !== 0){
      centerVal = ((centerVal + steps) % n + n) % n;
      rebuildDOM();
    }
    renderStatic(true);
    onChangeCb(centerVal);
  }

  outer.addEventListener('touchstart', e=>onStart(e.touches[0].clientY),{passive:true});
  outer.addEventListener('touchmove',  e=>onMove(e.touches[0].clientY),{passive:true});
  outer.addEventListener('touchend',   ()=>onEnd());
  outer.addEventListener('mousedown',  e=>onStart(e.clientY));
  document.addEventListener('mousemove', e=>{ if(dragging) onMove(e.clientY); });
  document.addEventListener('mouseup',   ()=>{ if(dragging) onEnd(); });
}

function elapsedStr(t){const d=Math.floor((Date.now()-t)/1000);const h=Math.floor(d/3600);const m=Math.floor((d%3600)/60);return h>0?`${h}h ${m.toString().padStart(2,'0')}m`:`${m}m ${(d%60).toString().padStart(2,'0')}s`;}
function etaStr(room){return new Date(room.startTime+room.durMs+room.extraMs).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit',hour12:false});}
function isWarn(room){if(!room.occupied)return false;const rem=(room.durMs+room.extraMs)-(Date.now()-room.startTime);return rem>0&&rem<=300000;}

  renderHistorial();
}

      <div class="step-indicator"><div class="step-dot-ind active"></div><div class="step-dot-ind"></div></div>
      <div class="step-title">Hora de inicio</div>
      <div class="step-sub">cuándo arranca el servicio</div>

          <div class="wheel-outer" id="eWrapH"></div>
          <div class="wheel-sep">:</div>
          <div class="wheel-outer" id="eWrapM"></div>
        </div>

  } else if(S.entryStep===2){
    document.getElementById('entryBackBtn').onclick=()=>{S.entryStep=1;renderEntryStep();};
    document.getElementById('entryBody').innerHTML=`
      <div class="step-indicator"><div class="step-dot-ind"></div><div class="step-dot-ind active"></div></div>
      <div class="step-title">Duración</div>
      <div class="step-sub">¿cuánto dura el servicio?</div>
      <div class="dur-opts">
        <div class="dur-opt ${S.entryDurMs===3600000?'sel':''}" onclick="selEntryDur(3600000,this)"><div class="dur-num">1h</div><div class="dur-label">1 hora</div></div>

        <div class="dur-opt" onclick="selEntryDur(-1,this)"><div class="dur-num">⏱</div><div class="dur-label">Específico</div></div>
      </div>
      <button class="btn-primary" onclick="confirmEntry()">Confirmar entrada</button>`;

  } else if(S.entryStep===3){
    document.getElementById('entryBackBtn').onclick=()=>{S.entryStep=2;renderEntryStep();};
    document.getElementById('entryBody').innerHTML=`
      <div class="step-title">Duración exacta</div>
      <div class="step-sub">horas y minutos</div>
      <div class="wheel-section">
        <div class="wheel-row">
          <div class="wheel-outer" id="eDWrapH"></div>
          <div class="wheel-sep">:</div>
          <div class="wheel-outer" id="eDWrapM"></div>
        </div>
      </div>

    buildWheel('eDWrapH',Array.from({length:12},(_,i)=>i.toString().padStart(2,'0')),S.entryCustomDurHIdx,i=>{S.entryCustomDurHIdx=i;});
    buildWheel('eDWrapM',MINS,S.entryCustomDurMIdx,i=>{S.entryCustomDurMIdx=i;});
  }
}

function selEntryM(id,el){
  S.entrySelMasajista=id==='admin'?'admin':parseInt(id);
  document.querySelectorAll('#eChips .m-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');

function selEntryDur(ms,el){
  if(ms===-1){S.entryStep=3;renderEntryStep();return;}
  S.entryDurMs=ms;
  document.querySelectorAll('.dur-opt').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}
function entryNext(){
  if(!S.entrySelMasajista){showToast('Elegí quién entra');return;}
  S.entryStep=2;renderEntryStep();
}
function confirmEntryCustomDur(){
  const h=S.entryCustomDurHIdx;const m=parseInt(MINS[S.entryCustomDurMIdx]);
  const ms=(h*60+m)*60000;
  if(ms<=0){showToast('Ingresá una duración válida');return;}
  S.entryDurMs=ms;S.entryStep=2;renderEntryStep();
}
function confirmEntry(){
  if(!S.entryDurMs||S.entryDurMs<=0){showToast('Elegí la duración');return;}
  const room=S.rooms.find(r=>r.id===S.entryRoomId);
  const person=S.entrySelMasajista==='admin'?{name:S.adminName}:S.masajistas.find(m=>m.id===S.entrySelMasajista);
  const h=parseInt(HOURS[S.entryHIdx]);const min=parseInt(MINS[S.entryMIdx]);
  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,min,0);
  room.occupied=true;room.masajista=person.name;room.startTime=start.getTime();
  room.durMs=S.entryDurMs;room.extraMs=0;
  room.note=document.getElementById('eNote')?.value||'';
  if(S.entrySelMasajista!=='admin'){
    const m=S.masajistas.find(m=>m.id===S.entrySelMasajista);
    if(m)m.available=false;
  }
  closeEntry();renderRooms();
  showToast(`${room.name} — inicio ${HOURS[S.entryHIdx]}:${MINS[S.entryMIdx]}`);
}

      <div style="font-family:'Cormorant Garamond',serif;font-size:4.5rem;font-weight:300;color:var(--pink);line-height:1" id="activeTimer">${elapsedStr(room.startTime)}</div>
      <div style="font-size:.78rem;color:var(--gold);font-weight:600;margin-top:5px">🕐 Fin estimado: ${etaStr(room)}</div>
      <div style="font-size:.78rem;color:var(--ink-muted);margin-top:5px"><strong style="color:var(--ink-soft)">${room.masajista}</strong></div>
      ${room.note?`<div style="font-size:.7rem;color:var(--ink-muted);font-style:italic;margin-top:4px">📝 ${room.note}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:9px;margin-top:24px">
      <button class="btn-secondary btn-warn" onclick="document.getElementById('addTimeModal').classList.add('open')">⏱ Agregar tiempo</button>
      <button class="btn-secondary btn-green" onclick="finalizarSesion(${room.id})">✓ Finalizar sesión</button>
    </div>`;
}
function finalizarSesion(id){
  const room=S.rooms.find(r=>r.id===id);
  const el=elapsedStr(room.startTime);
  S.historial.push({masajista:room.masajista,room:room.name,elapsed:el,hora:nowStr()});
  const m=S.masajistas.find(m=>m.name===room.masajista);
  if(m)m.available=true;
  room.occupied=false;room.masajista=null;room.startTime=null;room.note='';room.extraMs=0;
  closeActive();renderRooms();showToast(`Sesión finalizada · ${el}`);
}
function addTime(mins){
  const room=S.rooms.find(r=>r.id===S.activeRoomId);
  if(room){room.extraMs+=mins*60000;renderActiveBody();}
  document.getElementById('addTimeModal').classList.remove('open');
  showToast(`+${mins} min agregados`);
}
function closeAddTime(e){if(!e||e.target===document.getElementById('addTimeModal'))document.getElementById('addTimeModal').classList.remove('open');}

function startTimers(){
  setInterval(()=>{
    S.rooms.filter(r=>r.occupied).forEach(r=>{
      const el=document.getElementById(`tmr-${r.id}`);
      if(el)el.textContent=elapsedStr(r.startTime);
    });
    const at=document.getElementById('activeTimer');
    if(at&&S.activeRoomId){const r=S.rooms.find(r=>r.id===S.activeRoomId);if(r&&r.occupied)at.textContent=elapsedStr(r.startTime);}
  },1000);
  setInterval(()=>{
    const now=nowStr();
    S.rooms.filter(r=>!r.occupied).forEach(r=>{const el=document.getElementById(`tmr-${r.id}`);if(el)el.textContent=now;});
  },10000);
}

function renderHistorial(){
  const el=document.getElementById('histList');
  const data=isAdmin()?S.historial:S.historial.filter(h=>h.masajista===curM()?.name);
  document.getElementById('histSub').textContent=`${data.length} sesiones${isAdmin()?'':' tuyas'} hoy`;
  if(!data.length){el.innerHTML='<div class="empty-msg">Sin sesiones aún</div>';return;}
  el.innerHTML=data.slice().reverse().map(h=>`<div class="hist-item"><div class="hist-top"><div class="hist-name">${h.masajista}</div><div class="hist-time">${h.hora}</div></div><div class="hist-detail">${h.room} · ${h.elapsed}</div></div>`).join('');
}

// MY AGENDA
function renderMyAgenda(){
  const m=curM();if(!m){document.getElementById('agendaContent').innerHTML='';return;}
  const pend=m.agenda.filter(a=>!a.confirmed).length;
  const today=new Date();
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-today.getDay()+i+(m.weekOffset||0)*7);return d;});
  document.getElementById('agendaContent').innerHTML=`
    <div class="sec-title">Mi Agenda</div>
    ${pend>0?`<div class="notice pink"><strong>${pend} pendiente${pend>1?'s':''}</strong> de confirmar</div>`:''}
    <div class="week-nav">
      <button class="week-btn" onclick="chWeek(${m.id},-1)">‹</button>
      <div class="week-label">${weekDays[0].toLocaleDateString('es-UY',{day:'numeric',month:'short'})} – ${weekDays[6].toLocaleDateString('es-UY',{day:'numeric',month:'short'})}</div>
      <button class="week-btn" onclick="chWeek(${m.id},1)">›</button>
    </div>
    <div class="week-days">${weekDays.map(d=>{const isT=d.toDateString()===new Date().toDateString();return`<div class="week-day ${isT?'today':''}"><div class="wday-name">${DAYS[d.getDay()]}</div><div class="wday-num">${d.getDate()}</div></div>`;}).join('')}</div>
    <div class="card">${m.agenda.length===0?`<div class="empty-msg">Sin turnos</div>`:m.agenda.map((a,i)=>`
      <div class="aslot ${a.confirmed?'conf':'pend'}">
        <div class="aslot-time ${a.confirmed?'conf':'pend'}">${a.hora}</div>
        <div class="aslot-client">${a.client||'—'}</div>
        ${a.confirmed?`<div class="conf-chip">✓</div>`:`<button class="conf-btn-s" onclick="confSlot(${m.id},${i})">Confirmar</button>`}
      </div>`).join('')}</div>
    <div class="card"><div style="font-size:.74rem;font-weight:700;color:var(--ink-soft);margin-bottom:9px">Bloquear horarios</div>
      <div class="block-grid">${ALL_SLOTS.map(s=>{const bl=m.blocked.includes(s);const tk=m.agenda.map(a=>a.hora).includes(s);return`<div class="bchip ${bl?'is-bl':''} ${tk?'is-tk':''}" onclick="${tk?'':` tgBlock(${m.id},'${s}')`}">${s}</div>`;}).join('')}</div></div>
    <div class="card"><div style="font-size:.74rem;font-weight:700;color:var(--ink-soft);margin-bottom:7px">Notas</div>
      <textarea class="notes-ta" rows="3" id="myNotes" placeholder="Notas...">${m.notes}</textarea>
      <button class="btn-secondary" style="margin-top:6px" onclick="saveNotes(${m.id})">Guardar</button></div>`;
}
function chWeek(id,d){event.stopPropagation();S.masajistas.find(m=>m.id===id).weekOffset=(S.masajistas.find(m=>m.id===id).weekOffset||0)+d;renderMyAgenda();}
function confSlot(mid,i){S.masajistas.find(m=>m.id===mid).agenda[i].confirmed=true;isAdmin()?renderAdminAgenda():renderMyAgenda();showToast('Confirmado');}
function tgBlock(mid,slot){const m=S.masajistas.find(m=>m.id===mid);const idx=m.blocked.indexOf(slot);if(idx>=0)m.blocked.splice(idx,1);else m.blocked.push(slot);renderMyAgenda();}
function saveNotes(id){S.masajistas.find(m=>m.id===id).notes=document.getElementById('myNotes')?.value||'';showToast('Guardado');}

// ADMIN AGENDA
function renderAdminAgenda(){
  document.getElementById('agendaContent').innerHTML=`
    <div class="sec-title">Equipo</div><div class="sec-sub">Gestión de masajistas</div>
    ${S.masajistas.map(m=>{const pend=m.agenda.filter(a=>!a.confirmed).length;return`
      <div class="m-card">
        <div class="m-head" onclick="tgMcard(${m.id})">
          <div class="m-av" style="background:${m.color}">${m.name[0]}</div>
          <div class="m-info"><div class="m-name">${m.name}</div><div class="m-spec">${m.specialty}</div></div>
          <div class="m-right"><div class="av-pill"><div class="av-dot ${m.available?'f':'b'}"></div><div class="av-txt ${m.available?'f':'b'}">${m.available?'Libre':'En sesión'}</div></div>${pend>0?`<div class="pend-b">${pend} pend.</div>`:''}</div>
        </div>
        <div class="m-body ${m.openBody?'open':''}">
          <div class="m-btabs">
            <div class="m-btab ${m.bodyTab==='agenda'?'active':''}" onclick="setMTab(${m.id},'agenda')">Agenda</div>
            <div class="m-btab ${m.bodyTab==='config'?'active':''}" onclick="setMTab(${m.id},'config')">Config</div>
            <div class="m-btab ${m.bodyTab==='notas'?'active':''}" onclick="setMTab(${m.id},'notas')">Notas</div>
          </div>
          <div class="m-bc">
            ${m.bodyTab==='agenda'
              ?m.agenda.length===0?`<div class="empty-msg">Sin turnos</div>`:m.agenda.map((a,i)=>`
                <div class="aslot ${a.confirmed?'conf':'pend'}">
                  <div class="aslot-time ${a.confirmed?'conf':'pend'}">${a.hora}</div>
                  <div class="aslot-client">${a.client||'—'}</div>
                  ${a.confirmed?`<div class="conf-chip">✓</div>`:`<button class="conf-btn-s" onclick="confSlot(${m.id},${i})">Confirmar</button>`}
                </div>`).join('')
              :m.bodyTab==='config'?`
                <div class="form-group"><div class="form-label">WhatsApp</div><input class="form-input" value="${m.wpp}" onchange="S.masajistas.find(x=>x.id===${m.id}).wpp=this.value"></div>
                <div class="form-group"><div class="form-label">Cambiar PIN</div>
                  <input class="form-input" type="password" maxlength="4" placeholder="Nuevo PIN (4 dígitos)" id="np-${m.id}" style="letter-spacing:4px;text-align:center">
                  <button class="btn-secondary" style="margin-top:5px" onclick="chPin(${m.id})">Guardar PIN</button>
                </div>`
              :`<textarea class="notes-ta" rows="3" id="an-${m.id}" placeholder="Notas...">${m.notes}</textarea>
                <button class="btn-secondary" style="margin-top:6px" onclick="saveAdmN(${m.id})">Guardar</button>`}
          </div>
        </div>
      </div>`;}).join('')}
    <button class="add-btn" onclick="addMasajista()">+ Agregar masajista</button>
    <div style="margin-top:18px"><div class="sec-title" style="font-size:1.1rem">Mensaje a todas</div>
      <textarea class="notes-ta" rows="3" id="broadMsg" style="margin-top:7px" placeholder="Mensaje..."></textarea>
      <button class="btn-primary" style="margin-top:7px" onclick="broadcastWpp()">💬 Enviar a todas</button></div>`;
}
function tgMcard(id){event.stopPropagation();const m=S.masajistas.find(m=>m.id===id);m.openBody=!m.openBody;renderAdminAgenda();}
function setMTab(id,tab){event.stopPropagation();const m=S.masajistas.find(m=>m.id===id);m.bodyTab=tab;m.openBody=true;renderAdminAgenda();}
function chPin(id){
  event.stopPropagation();
  const v=document.getElementById(`np-${id}`)?.value.trim();
  if(!v||v.length!==4||isNaN(v)){showToast('PIN: 4 dígitos numéricos');return;}
  S.masajistas.find(m=>m.id===id).pin=v;
  document.getElementById(`np-${id}`).value='';
  showToast('PIN actualizado ✓');
}
function saveAdmN(id){event.stopPropagation();S.masajistas.find(m=>m.id===id).notes=document.getElementById(`an-${id}`)?.value||'';showToast('Guardado');}
function addMasajista(){
  const name=prompt('Nombre:');if(!name)return;
  const wpp=prompt('WhatsApp:')||'598900000';
  const pin='0000';
  S.masajistas.push({id:Date.now(),name,specialty:'Masajes',color:COLORS[S.masajistas.length%COLORS.length],available:true,pin,wpp,agenda:[],blocked:[],notes:'',openBody:false,bodyTab:'agenda',weekOffset:0});
  renderAdminAgenda();renderUserList();showToast(`${name} agregada · PIN por defecto: 0000`);
}
function broadcastWpp(){const msg=document.getElementById('broadMsg')?.value.trim();if(!msg){showToast('Escribí un mensaje');return;}S.masajistas.forEach(m=>{window.open(`https://wa.me/${m.wpp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');});showToast('Abriendo WhatsApp...');}

// RESERVAR
function initReservar(){
  S.resStep=1;S.resSelMasajista=isAdmin()?null:S.currentUser;
  const now=new Date();
  S.resHIdx=now.getHours();S.resMIdx=Math.round(now.getMinutes()/5)%12;
  S.resDurMs=3600000;
  document.getElementById('reservarSub').textContent=isAdmin()?'Reservá para cualquier masajista':'Reservá tu próximo turno';
  document.getElementById('confCard').classList.remove('show');
  document.getElementById('reservarContent').style.display='block';
  renderResStep();
}

function renderResStep(){
  const el=document.getElementById('reservarContent');
  if(S.resStep===1){
    const masajistaSection=isAdmin()?`
      <div class="chips-title">Masajista</div>
      <div class="chips-row" id="resChips">
        ${S.masajistas.map(x=>`<div class="m-chip ${S.resSelMasajista===x.id?'sel':''}" onclick="selResMasajista(${x.id},this)">${x.name}</div>`).join('')}
      </div>`:'';
    el.innerHTML=`
      <div class="step-indicator"><div class="step-dot-ind active"></div><div class="step-dot-ind"></div></div>
      <div class="step-title">Hora de inicio</div>
      <div class="step-sub">del turno</div>
      <div class="wheel-section">
        <div class="wheel-row">
          <div class="wheel-outer" id="rWrapH"></div>
          <div class="wheel-sep">:</div>
          <div class="wheel-outer" id="rWrapM"></div>
        </div>
      </div>
      ${masajistaSection}
      <button class="btn-primary" onclick="resNext()">Siguiente →</button>`;
    buildWheel('rWrapH',HOURS,S.resHIdx,i=>{S.resHIdx=i;});
    buildWheel('rWrapM',MINS,S.resMIdx,i=>{S.resMIdx=i;});

  } else if(S.resStep===2){
    el.innerHTML=`
      <div class="step-indicator"><div class="step-dot-ind"></div><div class="step-dot-ind active"></div></div>
      <div class="step-title">Duración</div>
      <div class="step-sub">¿cuánto dura el turno?</div>
      <div class="dur-opts">
        <div class="dur-opt ${S.resDurMs===3600000?'sel':''}" onclick="selResDur(3600000,this)"><div class="dur-num">1h</div><div class="dur-label">1 hora</div></div>
        <div class="dur-opt ${S.resDurMs===7200000?'sel':''}" onclick="selResDur(7200000,this)"><div class="dur-num">2h</div><div class="dur-label">2 horas</div></div>
        <div class="dur-opt" onclick="selResDur(-1,this)"><div class="dur-num">⏱</div><div class="dur-label">Específico</div></div>
      </div>
      <button class="btn-secondary" style="margin-bottom:9px" onclick="S.resStep=1;renderResStep()">← Atrás</button>
      <button class="btn-primary" onclick="confirmReserva()">Confirmar reserva</button>`;

  } else if(S.resStep===3){
    el.innerHTML=`
      <div class="step-title">Duración exacta</div>
      <div class="step-sub">horas y minutos</div>
      <div class="wheel-section">
        <div class="wheel-row">
          <div class="wheel-outer" id="rDWrapH"></div>
          <div class="wheel-sep">:</div>
          <div class="wheel-outer" id="rDWrapM"></div>
        </div>
      </div>
      <button class="btn-primary" onclick="confirmResCustomDur()">Confirmar duración</button>`;
    buildWheel('rDWrapH',Array.from({length:12},(_,i)=>i.toString().padStart(2,'0')),S.resCustomDurHIdx,i=>{S.resCustomDurHIdx=i;});
    buildWheel('rDWrapM',MINS,S.resCustomDurMIdx,i=>{S.resCustomDurMIdx=i;});
  }
}

function selResMasajista(id,el){S.resSelMasajista=id;document.querySelectorAll('#resChips .m-chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
function selResDur(ms,el){
  if(ms===-1){S.resStep=3;renderResStep();return;}
  S.resDurMs=ms;
  document.querySelectorAll('.dur-opt').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}
function resNext(){
  if(isAdmin()&&!S.resSelMasajista){showToast('Elegí una masajista');return;}
  S.resStep=2;renderResStep();
}
function confirmResCustomDur(){
  const h=S.resCustomDurHIdx;const m=parseInt(MINS[S.resCustomDurMIdx]);
  const ms=(h*60+m)*60000;
  if(ms<=0){showToast('Ingresá una duración válida');return;}
  S.resDurMs=ms;S.resStep=2;renderResStep();
}
function confirmReserva(){
  if(!S.resDurMs||S.resDurMs<=0){showToast('Elegí la duración');return;}
  const targetId=isAdmin()?S.resSelMasajista:S.currentUser;
  const m=S.masajistas.find(m=>m.id===targetId);
  const hora=`${HOURS[S.resHIdx]}:${MINS[S.resMIdx]}`;
  const durH=Math.floor(S.resDurMs/3600000);const durM=Math.floor((S.resDurMs%3600000)/60000);
  const durStr=durH>0?`${durH}h${durM>0?` ${durM}m`:''}`:` ${durM}m`;
  m.agenda.push({hora,client:isAdmin()?S.adminName:curM()?.name||'',confirmed:false,durMs:S.resDurMs});
  m.agenda.sort((a,b)=>a.hora.localeCompare(b.hora));
  document.getElementById('confBody').innerHTML=`<strong>${m.name}</strong><br>${hora} hs · ${durStr}`;
  document.getElementById('reservarContent').style.display='none';
  document.getElementById('confCard').classList.add('show');
  showToast('Turno reservado');
}
function resetReserva(){initReservar();}

// STATS
function renderStats(){
  const adm=isAdmin();const m=curM();
  const data=adm?S.historial:S.historial.filter(h=>h.masajista===m?.name);
  const agenda=adm?S.masajistas.reduce((a,x)=>a+x.agenda.length,0):m?.agenda.length||0;
  const slotCnt={};const src=adm?S.masajistas.reduce((a,x)=>[...a,...x.agenda],[]):m?.agenda||[];
  src.forEach(a=>{slotCnt[a.hora]=(slotCnt[a.hora]||0)+1;});
  const maxS=Math.max(1,...Object.values(slotCnt));const maxM=Math.max(1,...S.masajistas.map(x=>x.agenda.length));
  document.getElementById('statsContent').innerHTML=`
    <div class="sec-title">${adm?'Estadísticas':'Mis Stats'}</div>
    <div class="stats-filter">${['dia','semana','mes','anual'].map(f=>`<button class="sf-btn ${S.statsFilter===f?'active':''}" onclick="S.statsFilter='${f}';renderStats()">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}</div>
    <div class="stats-grid">
      <div class="stat-c"><div class="stat-n">${agenda}</div><div class="stat-l">Turnos agendados</div></div>
      <div class="stat-c"><div class="stat-n">${data.length}</div><div class="stat-l">Sesiones hoy</div></div>
      <div class="stat-c"><div class="stat-n">${adm?S.masajistas.filter(m=>!m.available).length:S.rooms.filter(r=>r.occupied&&r.masajista===m?.name).length}</div><div class="stat-l">En sesión ahora</div></div>
      <div class="stat-c"><div class="stat-n">${adm?S.masajistas.reduce((a,x)=>a+x.agenda.filter(t=>!t.confirmed).length,0):m?.agenda.filter(t=>!t.confirmed).length||0}</div><div class="stat-l">Pendientes</div></div>
    </div>
    <div class="card"><div style="font-size:.74rem;font-weight:700;color:var(--ink-soft);margin-bottom:10px">Horarios pico</div>
      ${ALL_SLOTS.map(s=>`<div class="bar-r"><div class="bar-ls"><span>${s}</span><span>${slotCnt[s]||0}</span></div><div class="bar-tr"><div class="bar-fi" style="width:${((slotCnt[s]||0)/maxS)*100}%;background:var(--pink)"></div></div></div>`).join('')}</div>
    ${adm?`<div class="card"><div style="font-size:.74rem;font-weight:700;color:var(--ink-soft);margin-bottom:10px">Por masajista</div>
      ${S.masajistas.map(x=>`<div class="bar-r"><div class="bar-ls"><span style="display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${x.color};display:inline-block"></span>${x.name}</span><span>${x.agenda.length}</span></div><div class="bar-tr"><div class="bar-fi" style="width:${(x.agenda.length/maxM)*100}%;background:${x.color}"></div></div></div>`).join('')}</div>`:''}`;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

renderUserList();
</script>
</body>
</html>
