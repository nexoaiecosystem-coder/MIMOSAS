<script>
// ── SUPABASE CONFIG ──
const SUPA_URL = 'https://hnhhugunnrjtkfpopnwh.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuaGh1Z3VubnJqdGtmcG9wbndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTc1MTYsImV4cCI6MjA5Nzk5MzUxNn0.THU48kHWzvs-0vGDyHjerf78KZQTyKajI_UAehmG-P8';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── SYNC LAYER ──
// Convierte fila de DB a objeto room local
function dbToRoom(row){
  return{
    id:row.id,name:row.name,
    occupied:row.occupied||false,
    masajista:row.masajista||null,
    startTime:row.start_time?Number(row.start_time):null,
    durMs:row.dur_ms?Number(row.dur_ms):3600000,
    extraMs:row.extra_ms?Number(row.extra_ms):0,
    note:row.note||''
  };
}

// Convierte fila de DB a objeto masajista local
function dbToMasajista(row, existing){
  return{
    ...(existing||{}),
    id:row.id,name:row.name,
    color:row.color||'#9B59FF',
    available:row.available!==false,
    pin:row.pin||'0000',
    wpp:row.wpp||'',
    notes:row.notes||'',
    weekOffset:row.week_offset||0,
    agenda:[],blocked:[],openBody:false,bodyTab:'agenda'
  };
}

// Carga inicial desde Supabase
async function loadFromSupabase(){
  try{
    showSyncStatus('Conectando...');

    // Cargar habitaciones
    const{data:rooms,error:re}=await supa.from('rooms').select('*').order('id');
    if(!re&&rooms){
      S.rooms=rooms.map(r=>dbToRoom(r));
    }

    // Cargar masajistas
    const{data:masajistas,error:me}=await supa.from('masajistas').select('*').order('name');
    if(!me&&masajistas){
      S.masajistas=masajistas.map(m=>dbToMasajista(m,S.masajistas.find(x=>x.id===m.id)));
    }

    // Cargar agenda de hoy
    const today=new Date().toISOString().split('T')[0];
    const{data:agenda}=await supa.from('agenda').select('*').eq('fecha',today);
    if(agenda){
      S.masajistas.forEach(m=>m.agenda=[]);
      agenda.forEach(a=>{
        const m=S.masajistas.find(m=>m.id===a.masajista_id);
        if(m)m.agenda.push({
          hora:a.hora,client:a.client||'',
          clientWpp:a.client_wpp||'',
          confirmed:a.confirmed||false,
          durMs:a.dur_ms?Number(a.dur_ms):3600000,
          dbId:a.id
        });
      });
      S.masajistas.forEach(m=>m.agenda.sort((a,b)=>a.hora.localeCompare(b.hora)));
    }

    // Cargar historial de hoy
    const{data:hist}=await supa.from('historial').select('*').eq('fecha',today).order('hora');
    if(hist){
      S.historial=hist.map(h=>({
        masajista:h.masajista,room:h.room,
        durReal:h.dur_real,durPlanned:h.dur_planned,
        hora:h.hora,startTime:h.start_time,dbId:h.id
      }));
    }

    hideSyncStatus();
    return true;
  }catch(e){
    hideSyncStatus();
    return false;
  }
}

// Escuchar cambios en tiempo real
function subscribeRealtime(){
  // Habitaciones en tiempo real
  supa.channel('rooms-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'rooms'},payload=>{
      const row=payload.new;
      if(!row)return;
      const idx=S.rooms.findIndex(r=>r.id===row.id);
      const updated=dbToRoom(row);
      if(idx>=0)S.rooms[idx]=updated;
      else S.rooms.push(updated);
      // Actualizar disponibilidad de masajistas
      S.masajistas.forEach(m=>{
        const enSesion=S.rooms.some(r=>r.occupied&&r.masajista===m.name);
        m.available=!enSesion;
      });
      renderRooms();
      buildTabs();
      saveState();
    })
    .subscribe();

  // Agenda en tiempo real
  const today=new Date().toISOString().split('T')[0];
  supa.channel('agenda-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'agenda',filter:`fecha=eq.${today}`},async()=>{
      // Recargar agenda completa del día
      const{data:agenda}=await supa.from('agenda').select('*').eq('fecha',today);
      if(agenda){
        S.masajistas.forEach(m=>m.agenda=[]);
        agenda.forEach(a=>{
          const m=S.masajistas.find(m=>m.id===a.masajista_id);
          if(m)m.agenda.push({
            hora:a.hora,client:a.client||'',
            clientWpp:a.client_wpp||'',
            confirmed:a.confirmed||false,
            durMs:a.dur_ms?Number(a.dur_ms):3600000,
            dbId:a.id
          });
        });
        S.masajistas.forEach(m=>m.agenda.sort((a,b)=>a.hora.localeCompare(b.hora)));
        buildTabs();
      }
    })
    .subscribe();
}

// ── DB WRITE FUNCTIONS ──
async function dbUpdateRoom(room){
  const{error}=await supa.from('rooms').upsert({
    id:room.id,name:room.name,
    occupied:room.occupied,
    masajista:room.masajista,
    start_time:room.startTime,
    dur_ms:room.durMs,
    extra_ms:room.extraMs,
    note:room.note||''
  });
  if(error){
    showToast('Error al sincronizar — reintentando...');
    // Retry once
    setTimeout(()=>supa.from('rooms').upsert({
      id:room.id,name:room.name,
      occupied:room.occupied,
      masajista:room.masajista,
      start_time:room.startTime,
      dur_ms:room.durMs,
      extra_ms:room.extraMs,
      note:room.note||''
    }),2000);
  }
}

async function dbInsertHistorial(entry){
  const today=new Date().toISOString().split('T')[0];
  await supa.from('historial').insert({
    masajista:entry.masajista,room:entry.room,
    dur_real:entry.durReal,dur_planned:entry.durPlanned,
    hora:entry.hora,start_time:entry.startTime,fecha:today
  });
}

async function dbInsertAgenda(masajistaId,slot){
  const today=new Date().toISOString().split('T')[0];
  const{data}=await supa.from('agenda').insert({
    masajista_id:masajistaId,hora:slot.hora,
    client:slot.client||'',client_wpp:slot.clientWpp||'',
    confirmed:false,dur_ms:slot.durMs,fecha:today
  }).select().single();
  return data?.id;
}

async function dbConfirmSlot(dbId){
  await supa.from('agenda').update({confirmed:true}).eq('id',dbId);
}

async function dbUpdateMasajista(m){
  await supa.from('masajistas').update({
    name:m.name,color:m.color,available:m.available,
    pin:m.pin,wpp:m.wpp,notes:m.notes
  }).eq('id',m.id);
}

async function dbInsertMasajista(m){
  await supa.from('masajistas').insert({
    id:m.id,name:m.name,color:m.color,
    available:true,pin:m.pin,wpp:m.wpp,notes:''
  });
}

async function dbDeleteMasajista(id){
  await supa.from('masajistas').delete().eq('id',id);
}

// Indicador de sync
function showSyncStatus(msg){}
function hideSyncStatus(){}
</script>

<script>
const COLORS=['#9B59FF','#E8749A','#5BB8A0','#E8944A','#5B8DEF','#B85BB8'];
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const HOURS=Array.from({length:24},(_,i)=>i.toString().padStart(2,'0'));
const MINS=['00','05','10','15','20','25','30','35','40','45','50','55'];

let S={
  rooms:[
    {id:1,name:'Habitación 1',occupied:false,masajista:null,startTime:null,durMs:3600000,note:'',extraMs:0},
    {id:2,name:'Habitación 2',occupied:false,masajista:null,startTime:null,durMs:3600000,note:'',extraMs:0},
  ],
  masajistas:[
    {id:1,name:'Jess',  color:COLORS[0],available:true,pin:'1111',wpp:'59891000001',agenda:[],blocked:[],notes:'',openBody:false,bodyTab:'agenda',weekOffset:0},
    {id:2,name:'Nahuel',color:COLORS[1],available:true,pin:'2222',wpp:'59891000002',agenda:[],blocked:[],notes:'',openBody:false,bodyTab:'agenda',weekOffset:0},
    {id:3,name:'Mai',   color:COLORS[2],available:true,pin:'3333',wpp:'59891000003',agenda:[],blocked:[],notes:'',openBody:false,bodyTab:'agenda',weekOffset:0},
    {id:4,name:'Romi',  color:COLORS[3],available:true,pin:'4444',wpp:'59891000004',agenda:[],blocked:[],notes:'',openBody:false,bodyTab:'agenda',weekOffset:0},
  ],
  adminName:'Lulucha',adminPin:'5601',adminColor:COLORS[4],
  historial:[],
  currentUser:null,lastUser:null,
  statsFilter:'dia',darkMode:false,
  entryRoomId:null,entryStep:1,
  entryHIdx:0,entryMIdx:0,entryDurMs:3600000,
  entryCustomDurHIdx:1,entryCustomDurMIdx:0,
  resStep:1,resSelMasajista:null,
  resHIdx:0,resMIdx:0,resDurMs:3600000,
  resCustomDurHIdx:1,resCustomDurMIdx:0,
  activeRoomId:null,
  deleteTargetId:null,
  silentMode:false,
};

let pinBuf='',pinTarget=null;
let warnSoundPlayed={};
let toastTimer=null;

// CLOCK
function nowStr(){return new Date().toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit',hour12:false});}
setInterval(()=>{const el=document.getElementById('navClock');if(el)el.textContent=nowStr();},1000);

// DARK
function toggleDark(){
  S.darkMode=!S.darkMode;
  document.body.classList.toggle('dark',S.darkMode);
  const dt=document.getElementById('darkToggleBtn');
  if(dt)dt.classList.toggle('on',S.darkMode);
}

// SIMPLE TIME PICKER
function buildTimePicker(containerId,items,initIdx,onChangeCb){
  const scroll=document.getElementById(containerId);
  if(!scroll)return;

  // Build items with padding
  scroll.innerHTML='';
  const pad=document.createElement('div');pad.style.height='60px';scroll.appendChild(pad);
  items.forEach((v,i)=>{
    const el=document.createElement('div');
    el.className='time-scroll-item';
    el.textContent=v;el.dataset.idx=i;
    scroll.appendChild(el);
  });
  const pad2=document.createElement('div');pad2.style.height='60px';scroll.appendChild(pad2);

  // Scroll to init
  scroll.scrollTop=initIdx*60;

  function updateSelected(){
    const idx=Math.round(scroll.scrollTop/60);
    scroll.querySelectorAll('.time-scroll-item').forEach((el,i)=>{
      el.classList.toggle('selected',i===idx);
    });
    onChangeCb(Math.max(0,Math.min(items.length-1,idx)));
  }

  scroll.addEventListener('scroll',()=>updateSelected(),{passive:true});
  // Snap on end
  scroll.addEventListener('scrollend',()=>{
    const idx=Math.round(scroll.scrollTop/60);
    scroll.scrollTo({top:idx*60,behavior:'smooth'});
    updateSelected();
  },{passive:true});

  // Fallback for browsers without scrollend
  let scrollTimer;
  scroll.addEventListener('scroll',()=>{
    clearTimeout(scrollTimer);
    scrollTimer=setTimeout(()=>{
      const idx=Math.round(scroll.scrollTop/60);
      scroll.scrollTo({top:idx*60,behavior:'smooth'});
      updateSelected();
    },150);
  },{passive:true});

  updateSelected();
}

function scrollPickerTo(containerId,idx){
  const container=document.getElementById(containerId);
  if(!container)return;
  const scroll=container.querySelector('.time-scroll');
  if(scroll)scroll.scrollTo({top:idx*60,behavior:'smooth'});
}

// WARNING
function triggerWarnAlert(roomId){
  if(S.silentMode||warnSoundPlayed[roomId])return;
  warnSoundPlayed[roomId]=true;
  if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((freq,i)=>{
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+i*.25);
      gain.gain.linearRampToValueAtTime(.3,ctx.currentTime+i*.25+.05);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.25+.3);
      osc.start(ctx.currentTime+i*.25);osc.stop(ctx.currentTime+i*.25+.35);
    });
  }catch(e){}
}

// LOGIN
function renderUserList(){
  const total=S.masajistas.reduce((a,m)=>a+m.agenda.length,0);
  const people=[
    {id:'admin',name:S.adminName,role:'Administradora',color:'rgba(255,255,255,.2)',turns:total,isAdmin:true},
    ...S.masajistas.map(m=>({id:m.id,name:m.name,role:'Masajista',color:m.color,turns:m.agenda.length,isAdmin:false}))
  ];
  // Put last used first
  if(S.lastUser){
    const idx=people.findIndex(p=>p.id===S.lastUser);
    if(idx>0){const [item]=people.splice(idx,1);people.unshift(item);}
  }
  document.getElementById('userList').innerHTML=people.map(p=>`
    <div class="user-option ${p.isAdmin?'admin-opt':''} ${p.id===S.lastUser?'last-used':''}" onclick="selectUser('${p.id}')">
      <div class="u-av" style="background:${p.isAdmin?'rgba(255,255,255,.2)':p.color}">${p.isAdmin?'👑':p.name[0]}</div>
      <div><div class="u-name" style="${p.isAdmin?'':'color:var(--ink)'}">${p.name}</div><div class="u-role">${p.role}</div></div>

function pdel(){pinBuf=pinBuf.slice(0,-1);updateDots();}
function updateDots(){for(let i=0;i<4;i++)document.getElementById(`pd${i}`).className='pin-dot'+(i<pinBuf.length?' filled':'');}
function checkPin(){
  const m=S.masajistas.find(m=>m.id===pinTarget);

  if(!ok&&pinTarget!=='admin'){

// TABS
function buildTabs(){

    :[{id:'rooms',i:'🛏',l:'Salas',dot:hasActive?'active':null},{id:'agenda',i:'📅',l:'Mi Agenda',dot:myPending?'pend':null},{id:'reservar',i:'✚',l:'Reservar'},{id:'stats',i:'📊',l:'Mis Stats'}];

function switchTab(tab){
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));

// ROOMS
function remainingMs(room){return Math.max(0,(room.durMs+room.extraMs)-(Date.now()-room.startTime));}
function isWarn(room){if(!room.occupied)return false;const r=remainingMs(room);return r>0&&r<=300000;}
function isOver(room){return room.occupied&&remainingMs(room)===0;}
function progressPct(room){if(!room.occupied)return 0;return Math.max(0,100-(remainingMs(room)/(room.durMs+room.extraMs))*100);}

function countdownStr(room){
  const rem=remainingMs(room);
  const totalS=Math.floor(rem/1000);
  const h=Math.floor(totalS/3600);
  const m=Math.floor((totalS%3600)/60);
  const s=totalS%60;
  if(h>0)return`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  return`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function startTimeStr(ts){return new Date(ts).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit',hour12:false});}

function checkNextBooking(){
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes();
  const el=document.getElementById('nextBookingAlert');
  if(!el)return;
  const upcoming=S.masajistas.flatMap(m=>m.agenda.map(a=>({...a,masajista:m.name}))).filter(a=>{
    const[h,min]=a.hora.split(':').map(Number);
    const slotMins=h*60+min;
    return slotMins>nowMins&&slotMins<=nowMins+15;
  });
  if(upcoming.length){
    el.innerHTML=upcoming.map(a=>`<div class="next-booking-alert">📅 Turno próximo: <strong>${a.masajista}</strong> a las ${a.hora}</div>`).join('');
  } else {
    el.innerHTML='';
  }
}

function renderRooms(){
  checkNextBooking();
  buildTabs();
  document.getElementById('roomsGrid').innerHTML=S.rooms.map(r=>{
    const warn=isWarn(r);const over=isOver(r);
    const pct=progressPct(r);
    return`<div class="room-card ${r.occupied?(warn||over?'warning':'occ'):''}">
      <div class="room-top">
        <div class="room-name">${r.name}</div>
        <div class="status-badge ${r.occupied?(warn||over?'warn':'busy'):'free'}">
          <div class="sdot ${r.occupied?(warn||over?'warn':'busy'):'free'}"></div>
          <div class="slabel ${r.occupied?(warn||over?'warn':'busy'):'free'}">${r.occupied?(warn?'¡5 min!':over?'¡Tiempo!':'En sesión'):'Libre'}</div>
        </div>
      </div>
      ${r.occupied?`
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="room-time ${warn||over?'warn-t':'running'}" id="tmr-${r.id}">${countdownStr(r)}</div>
        <div class="room-start">Inicio: ${startTimeStr(r.startTime)}</div>
        <div class="room-who">${r.masajista}</div>
        ${r.note?`<div class="room-note-txt">📝 ${r.note}</div>`:''}
      `:`<div class="room-time free-t" id="tmr-${r.id}">${nowStr()}</div>`}
      <button class="room-btn ${r.occupied?'manage':'enter'}" onclick="${r.occupied?`openActive('${r.id}')`:`openEntry('${r.id}')`}">
        ${r.occupied?'Ver sesión':'Marcar entrada'}
      </button>
    </div>`;}).join('');
  renderHistorial();
}

            <div class="time-scroll" id="eDScrollM"></div>

function selEntryM(id,el){

  el.classList.add('sel');

function selEntryDur(ms,el){

  S.entryDurMs=ms;
  document.querySelectorAll('.dur-opt').forEach(d=>d.classList.remove('sel'));

}
function entryNext(){

}
function confirmEntryCustomDur(){
  const h=S.entryCustomDurHIdx;const m=parseInt(MINS[S.entryCustomDurMIdx]);

function confirmEntry(){
  if(!S.entryDurMs||S.entryDurMs<=0){showToast('Elegí la duración');return;}
  const room=S.rooms.find(r=>r.id===S.entryRoomId);
  const selId=S.entrySelMasajista;

  room.occupied=true;room.masajista=person.name;room.startTime=Date.now();
  room.durMs=S.entryDurMs;room.extraMs=0;
  room.note=document.getElementById('eNote')?.value||'';
  if(selId!=='admin'){const m=S.masajistas.find(m=>m.id===selId);if(m)m.available=false;}
  warnSoundPlayed[room.id]=false;
  S.entrySelMasajista=null;
  dbUpdateRoom(room);
  saveState();
  closeEntry();renderRooms();

function addTime(mins){

  if(room){room.extraMs+=mins*60000;warnSoundPlayed[room.id]=false;renderActiveBody();dbUpdateRoom(room);}
  document.getElementById('addTimeModal').classList.remove('open');
  showToast(`+${mins} min agregados`);
}

function quickAddTime(roomId){
  const room=S.rooms.find(r=>r.id===roomId);
  if(room){room.extraMs+=15*60000;warnSoundPlayed[room.id]=false;renderActiveBody();dbUpdateRoom(room);}
  showToast('+15 min agregados');
}

function saveActiveNote(roomId){
  const room=S.rooms.find(r=>r.id===roomId);
  if(!room)return;
  room.note=document.getElementById('editNote')?.value||'';
  dbUpdateRoom(room);
  showToast('Nota guardada');
}

function finalizarSesion(id){
  const room=S.rooms.find(r=>r.id===id);
  const realMs=Date.now()-room.startTime;
  const totalS=Math.floor(realMs/1000);
  const h=Math.floor(totalS/3600);const m=Math.floor((totalS%3600)/60);
  const durReal=h>0?`${h}h ${m.toString().padStart(2,'0')}m`:`${m}m`;
  const durPlanned=room.durMs/60000>=60?`${Math.floor(room.durMs/3600000)}h`:`${room.durMs/60000}m`;
  const entry={masajista:room.masajista,room:room.name,durReal,durPlanned,hora:nowStr(),startTime:startTimeStr(room.startTime)};
  S.historial.push(entry);
  dbInsertHistorial(entry);
  const m2=S.masajistas.find(m=>m.name===room.masajista);
  if(m2){m2.available=true;dbUpdateMasajista(m2);}
  delete warnSoundPlayed[id];
  room.occupied=false;room.masajista=null;room.startTime=null;room.note='';room.extraMs=0;
  dbUpdateRoom(room);
  saveState();
  const wppMsg=encodeURIComponent(`🌸 Sesión finalizada — ${room.name}\nMasajista: ${entry.masajista}\nInicio: ${entry.startTime}\nDuración real: ${durReal} / Pautado: ${durPlanned}`);
  closeActive();renderRooms();
  showToast(`Sesión finalizada · ${durReal}`);
  setTimeout(()=>{
    if(confirm('¿Enviar resumen a Lulucha por WhatsApp?')){
      window.open(`https://wa.me/${S.masajistas.find(m=>m.name===S.adminName)?.wpp||''}?text=${wppMsg}`,'_blank');
    }
  },500);
}


function startTimers(){
  setInterval(()=>{
    const now=nowStr();
    S.rooms.forEach(r=>{
      const el=document.getElementById(`tmr-${r.id}`);
      if(!el)return;
      if(r.occupied){
        el.textContent=countdownStr(r);
        const warn=isWarn(r)||isOver(r);
        el.className=`room-time ${warn?'warn-t':'running'}`;
        if(warn)triggerWarnAlert(r.id);
      } else {
        el.textContent=now;
      }
    });
    const ac=document.getElementById('activeCountdown');
    const ap=document.getElementById('activeProg');
    if(ac&&S.activeRoomId){
      const r=S.rooms.find(r=>r.id===S.activeRoomId);
      if(r&&r.occupied){
        ac.textContent=countdownStr(r);
        ac.style.color=isWarn(r)||isOver(r)?'var(--warn)':'var(--pink)';
        if(ap)ap.style.width=progressPct(r)+'%';
      }
    }
  },1000);
  setInterval(checkNextBooking,60000);
}

function chWeek(id,d){event.stopPropagation();S.masajistas.find(m=>m.id===id).weekOffset=(S.masajistas.find(m=>m.id===id).weekOffset||0)+d;renderMyAgenda();}
function confSlot(mid,i){
  const m=S.masajistas.find(m=>m.id===mid);
  m.agenda[i].confirmed=true;
  const a=m.agenda[i];
  if(a.dbId)dbConfirmSlot(a.dbId);
  if(a.clientWpp){
    const msg=encodeURIComponent(`Hola ${a.client} 🌸 Tu turno con ${m.name} a las ${a.hora} está confirmado. ¡Te esperamos en Mimosas, Buceo!`);
    window.open(`https://wa.me/${a.clientWpp.replace(/\D/g,'')}?text=${msg}`,'_blank');
  }
  isAdmin()?renderAdminAgenda():renderMyAgenda();
  showToast('Turno confirmado ✓');
}
function tgBlock(mid,slot){const m=S.masajistas.find(m=>m.id===mid);const idx=m.blocked.indexOf(slot);if(idx>=0)m.blocked.splice(idx,1);else m.blocked.push(slot);renderMyAgenda();}
function saveNotes(id){S.masajistas.find(m=>m.id===id).notes=document.getElementById('myNotes')?.value||'';showToast('Guardado');}

                  <input class="form-input" type="password" maxlength="4" placeholder="Nuevo PIN" id="np-${m.id}" style="letter-spacing:4px;text-align:center">

                </div>

function renderDaySummary(){
  if(!S.historial.length)return`<div class="empty-msg">Sin sesiones finalizadas aún</div>`;
  const byM={};S.historial.forEach(h=>{byM[h.masajista]=(byM[h.masajista]||0)+1;});
  const rooms={};S.historial.forEach(h=>{rooms[h.room]=(rooms[h.room]||0)+1;});
  const topRoom=Object.entries(rooms).sort((a,b)=>b[1]-a[1])[0];
  return`<div class="summary-card">
    <div class="summary-row"><div class="summary-label">Total sesiones</div><div class="summary-val">${S.historial.length}</div></div>
    ${Object.entries(byM).map(([n,c])=>`<div class="summary-row"><div class="summary-label">${n}</div><div class="summary-val">${c} sesión${c>1?'es':''}</div></div>`).join('')}
    ${topRoom?`<div class="summary-row"><div class="summary-label">Habitación más usada</div><div class="summary-val">${topRoom[0]}</div></div>`:''}
  </div>`;
}

function tgMcard(id){event.stopPropagation();const m=S.masajistas.find(m=>m.id===id);m.openBody=!m.openBody;renderAdminAgenda();}
function setMTab(id,tab){event.stopPropagation();const m=S.masajistas.find(m=>m.id===id);m.bodyTab=tab;m.openBody=true;renderAdminAgenda();}
function chPin(id){
  event.stopPropagation();
  const v=document.getElementById(`np-${id}`)?.value.trim();
  if(!v||v.length!==4||isNaN(v)){showToast('PIN: 4 dígitos');return;}
  const m=S.masajistas.find(m=>m.id===id);
  m.pin=v;
  dbUpdateMasajista(m);
  document.getElementById(`np-${id}`).value='';
  showToast('PIN actualizado ✓');
}
function addMasajista(){
  const name=prompt('Nombre:');if(!name)return;
  const wpp=prompt('WhatsApp:')||'598900000';
  const newM={id:name.toLowerCase().replace(/\s/g,'_')+Date.now(),name,color:COLORS[S.masajistas.length%COLORS.length],available:true,pin:'0000',wpp,agenda:[],blocked:[],notes:'',openBody:false,bodyTab:'agenda',weekOffset:0};
  S.masajistas.push(newM);
  dbInsertMasajista(newM);
  renderAdminAgenda();renderUserList();showToast(`${name} agregada · PIN: 0000`);
}
function askDeleteMasajista(id){
  event.stopPropagation();
  S.deleteTargetId=id;
  const m=S.masajistas.find(m=>m.id===id);
  document.getElementById('deleteMsg').textContent=`¿Eliminar a ${m.name}? Esta acción no se puede deshacer.`;
  document.getElementById('deleteDialog').classList.add('open');
}
function doDeleteMasajista(){
  dbDeleteMasajista(S.deleteTargetId);
  S.masajistas=S.masajistas.filter(m=>m.id!==S.deleteTargetId);
  document.getElementById('deleteDialog').classList.remove('open');
  renderAdminAgenda();renderUserList();showToast('Masajista eliminada');

function broadcastWpp(){const msg=document.getElementById('broadMsg')?.value.trim();if(!msg){showToast('Escribí un mensaje');return;}S.masajistas.forEach(m=>{window.open(`https://wa.me/${m.wpp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');});showToast('Abriendo WhatsApp...');}

// RESERVAR
function initReservar(){
  S.resStep=1;S.resSelMasajista=isAdmin()?null:S.currentUser;
  const now=new Date();
  S.resHIdx=now.getHours();S.resMIdx=Math.round(now.getMinutes()/5)%MINS.length;
  S.resDurMs=3600000;S.resClientName='';
  document.getElementById('reservarSub').textContent=isAdmin()?'Reservá para cualquier masajista':'Reservá tu próximo turno';
  document.getElementById('confCard').classList.remove('show');
  document.getElementById('reservarContent').style.display='block';
  renderResStep();
}

function renderResStep(){

            <div class="time-scroll-line"></div>
            <div class="time-scroll-line bottom"></div>

      </div>

        <div class="form-label">WhatsApp del cliente</div>
        <input class="form-input" id="resClientWpp" type="tel" placeholder="+598 9X XXX XXX">
      </div>

      <button class="btn-primary" onclick="resNext()">Siguiente →</button>`;
    buildTimePicker('rScrollH',HOURS,S.resHIdx,i=>{S.resHIdx=i;});
    buildTimePicker('rScrollM',MINS,S.resMIdx,i=>{S.resMIdx=i;});

  }else if(S.resStep===2){
    el.innerHTML=`
      <div class="step-indicator"><div class="step-dot-ind"></div><div class="step-dot-ind active"></div></div>
      <div class="step-title">Duración</div>
      <div class="step-sub">¿cuánto dura el turno?</div>
      <div class="dur-opts">
        <div class="dur-opt ${S.resDurMs===3600000?'sel':''}" onclick="selResDur(3600000,this)"><div class="dur-num">1h</div><div class="dur-label">1 hora</div></div>
        <div class="dur-opt ${S.resDurMs===7200000?'sel':''}" onclick="selResDur(7200000,this)"><div class="dur-num">2h</div><div class="dur-label">2 horas</div></div>
        <div class="dur-opt" onclick="selResDur(-1,this)"><div class="dur-num">⏱</div><div class="dur-label">Específico</div></div>
      </div>
      <button class="btn-secondary" style="margin-bottom:9px" onclick="S.resStep=1;renderResStep()">← Atrás</button>
      <button class="btn-primary" onclick="confirmReserva()">Confirmar reserva</button>`;

  }else if(S.resStep===3){
    el.innerHTML=`
      <div class="step-title">Duración exacta</div>
      <div class="step-sub">horas y minutos</div>
      <div class="time-picker">
        <div class="time-col">

function selResMasajista(id,el){S.resSelMasajista=id;document.querySelectorAll('#resChips .m-chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');renderResStep();}
function selResDur(ms,el){
  if(ms===-1){S.resStep=3;renderResStep();return;}
  S.resDurMs=ms;
  document.querySelectorAll('.dur-opt').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}
function resNext(){
  if(isAdmin()&&!S.resSelMasajista){showToast('Elegí una masajista');return;}
  S.resClientName=document.getElementById('resClientName')?.value||'';
  S.resClientWpp=document.getElementById('resClientWpp')?.value||'';
  S.resStep=2;renderResStep();
}
function confirmResCustomDur(){
  const h=S.resCustomDurHIdx;const m=parseInt(MINS[S.resCustomDurMIdx]);
  const ms=(h*60+m)*60000;
  if(ms<=0){showToast('Ingresá una duración válida');return;}
  S.resDurMs=ms;S.resStep=2;renderResStep();
}
function confirmReserva(){
  if(!S.resDurMs||S.resDurMs<=0){showToast('Elegí la duración');return;}
  const targetId=isAdmin()?S.resSelMasajista:S.currentUser;
  const m=S.masajistas.find(m=>m.id===targetId);
  const hora=`${HOURS[S.resHIdx]}:${MINS[S.resMIdx]}`;
  const durH=Math.floor(S.resDurMs/3600000);const durM=Math.floor((S.resDurMs%3600000)/60000);
  const durStr=durH>0?`${durH}h${durM>0?` ${durM}m`:''}`:` ${durM}m`;
  const slot={hora,client:S.resClientName||(isAdmin()?S.adminName:curM()?.name||''),clientWpp:S.resClientWpp||'',confirmed:false,durMs:S.resDurMs};
  m.agenda.push(slot);
  m.agenda.sort((a,b)=>a.hora.localeCompare(b.hora));
  dbInsertAgenda(m.id,slot).then(dbId=>{if(dbId)slot.dbId=dbId;});
  document.getElementById('confBody').innerHTML=`<strong>${m.name}</strong><br>${hora} hs · ${durStr}${S.resClientName?`<br>Cliente: ${S.resClientName}`:''}`;
  document.getElementById('reservarContent').style.display='none';
  document.getElementById('confCard').classList.add('show');
  showToast('Turno reservado ✓');
}
function resetReserva(){S.resClientName='';S.resClientWpp='';initReservar();}

// STATS
function renderStats(){
  const adm=isAdmin();const m=curM();
  const data=adm?S.historial:S.historial.filter(h=>h.masajista===m?.name);
  const agenda=adm?S.masajistas.reduce((a,x)=>a+x.agenda.length,0):m?.agenda.length||0;
  const slotCnt={};
  const src=adm?S.masajistas.reduce((a,x)=>[...a,...x.agenda],[]):m?.agenda||[];
  src.forEach(a=>{slotCnt[a.hora]=(slotCnt[a.hora]||0)+1;});
  const topSlots=Object.entries(slotCnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxS=Math.max(1,...Object.values(slotCnt));
  const maxM=Math.max(1,...S.masajistas.map(x=>x.agenda.length));
  document.getElementById('statsContent').innerHTML=`
    <div class="sec-title">${adm?'Estadísticas':'Mis Stats'}</div>
    <div class="stats-filter">${['dia','semana','mes','anual'].map(f=>`<button class="sf-btn ${S.statsFilter===f?'active':''}" onclick="S.statsFilter='${f}';renderStats()">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}</div>
    <div class="stats-grid">
      <div class="stat-c"><div class="stat-n">${agenda}</div><div class="stat-l">Turnos agendados</div></div>
      <div class="stat-c"><div class="stat-n">${data.length}</div><div class="stat-l">Sesiones realizadas</div></div>
      <div class="stat-c"><div class="stat-n">${adm?S.masajistas.filter(m=>!m.available).length:S.rooms.filter(r=>r.occupied&&r.masajista===m?.name).length}</div><div class="stat-l">En sesión ahora</div></div>
      <div class="stat-c"><div class="stat-n">${adm?S.masajistas.reduce((a,x)=>a+x.agenda.filter(t=>!t.confirmed).length,0):m?.agenda.filter(t=>!t.confirmed).length||0}</div><div class="stat-l">Pendientes</div></div>
    </div>
    ${topSlots.length?`<div class="card"><div style="font-size:.74rem;font-weight:700;color:var(--ink-soft);margin-bottom:10px">Horarios pico</div>
      ${topSlots.map(([s,c])=>`<div class="bar-r"><div class="bar-ls"><span>${s}</span><span>${c}</span></div><div class="bar-tr"><div class="bar-fi" style="width:${(c/maxS)*100}%;background:var(--pink)"></div></div></div>`).join('')}</div>`:''}
    ${adm?`<div class="card"><div style="font-size:.74rem;font-weight:700;color:var(--ink-soft);margin-bottom:10px">Por masajista</div>
      ${S.masajistas.map(x=>`<div class="bar-r"><div class="bar-ls"><span style="display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${x.color};display:inline-block"></span>${x.name}</span><span>${x.agenda.length}</span></div><div class="bar-tr"><div class="bar-fi" style="width:${(x.agenda.length/maxM)*100}%;background:${x.color}"></div></div></div>`).join('')}</div>`:''}`;
}

      darkMode:S.darkMode,
      silentMode:S.silentMode,
    }));
  }catch(e){}
}

function loadState(){
  try{
    const saved=localStorage.getItem('mimosas_state');
    if(!saved)return;
    const p=JSON.parse(saved);
    // Si los IDs guardados son numéricos (versión vieja), limpiar y no cargar
    if(p.masajistas&&p.masajistas.length&&typeof p.masajistas[0].id==='number'){
      localStorage.removeItem('mimosas_state');
      return;
    }
    // Masajistas — merge preservando defaults
    if(p.masajistas&&p.masajistas.length){
      S.masajistas=p.masajistas.map(m=>({
        ...S.masajistas.find(x=>x.id===m.id)||{},
        ...m,
        openBody:false,
      }));
    }
    // Historial
    if(p.historial)S.historial=p.historial;
    // Rooms — restaurar solo si hay sesión activa reciente (menos de 3h)
    if(p.rooms){
      p.rooms.forEach(saved=>{
        const room=S.rooms.find(r=>r.id===saved.id);
        if(room&&saved.occupied&&saved.startTime){
          const elapsed=Date.now()-saved.startTime;
          if(elapsed<10800000){
            Object.assign(room,saved);
          }
        }
        if(room&&!saved.occupied){
          room.occupied=false;room.masajista=null;room.note='';
        }
      });
    }
    if(p.lastUser!==undefined)S.lastUser=p.lastUser;
    if(p.darkMode!==undefined)S.darkMode=p.darkMode;
    if(p.silentMode!==undefined)S.silentMode=p.silentMode;
    if(S.darkMode){
      document.body.classList.add('dark');
      const dt=document.getElementById('darkToggleBtn');
      if(dt)dt.classList.add('on');
    }
  }catch(e){
    localStorage.removeItem('mimosas_state');
  }
}

// Auto-save cada vez que cambia algo importante
const _origSave=saveState;
['confirmEntry','finalizarSesion','confirmReserva','confSlot',
 'addMasajista','doDeleteMasajista','doLogout','toggleDark'].forEach(fn=>{
  const orig=window[fn];
  if(orig)window[fn]=function(...args){
    const r=orig.apply(this,args);
    saveState();
    return r;
  };
});

// CIERRE DE DÍA AUTOMÁTICO
function checkDayReset(){
  try{
    const lastDate=localStorage.getItem('mimosas_last_date');
    const today=new Date().toDateString();
    if(lastDate&&lastDate!==today){
      // Nuevo día — limpiar historial y reservas del día anterior
      S.historial=[];
      S.masajistas.forEach(m=>{m.agenda=[];m.blocked=[];});
      S.rooms.forEach(r=>{r.occupied=false;r.masajista=null;r.startTime=null;r.note='';r.extraMs=0;});
      saveState();
      showToast('Nuevo día — agenda reiniciada');
    }
    localStorage.setItem('mimosas_last_date',today);
  }catch(e){}
}

// INIT
try{
  const old=localStorage.getItem('mimosas_state');
  if(old){
    const p=JSON.parse(old);
    if(p.masajistas&&p.masajistas.length&&typeof p.masajistas[0].id==='number'){
      localStorage.clear();
    }
  }
}catch(e){localStorage.clear();}

loadState();
checkDayReset();

// Mostrar loading hasta que Supabase cargue
document.getElementById('userList').innerHTML='<div style="text-align:center;padding:20px;color:var(--ink-muted);font-size:.8rem">Cargando...</div>';

loadFromSupabase().then(ok=>{
  if(ok){
    subscribeRealtime();
  }
  renderUserList();
});
</script>
